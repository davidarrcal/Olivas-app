services:
  postgres:
    image: postgres:16-alpine
    container_name: olivas_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: olivas_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .
    container_name: olivas_api
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/olivas_db
      NODE_ENV: production
      PORT: 3001
    ports:
      - "3001:3001"
    depends_on:
      - postgres

volumes:
  postgres_data: