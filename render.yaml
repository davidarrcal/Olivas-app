services:
  - type: web
    name: olivas-api
    runtime: node
    plan: free
    buildCommand: cd packages/api && npm install && npx prisma generate
    startCommand: cd packages/api && npx prisma migrate deploy && node src/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: PORT
        value: 10000
      - key: FRONTEND_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: AEMET_API_KEY
        sync: false
      - key: AEMET_MUNICIPIO
        value: "18098"